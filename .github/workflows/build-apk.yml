name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]
    paths:
      - "android_app/**"
      - ".github/workflows/build-apk.yml"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: |
          sudo apt update
          sudo apt install -y \
            zip unzip openjdk-17-jdk \
            autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev \
            libffi-dev libssl-dev

      - name: Install Buildozer
        run: |
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Build debug APK
        working-directory: android_app
        run: |
          buildozer -v android debug 2>&1 | tee buildozer.log

      - name: List build outputs
        if: always()
        run: |
          echo "== android_app/bin =="
          ls -lah android_app/bin || true
          echo "== find apk/aab =="
          find android_app -maxdepth 3 \( -name "*.apk" -o -name "*.aab" \) -print || true

      - name: Upload APK artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appchat-apk
          path: |
            android_app/bin/*.apk
            android_app/bin/*.aab
          if-no-files-found: warn

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buildozer-log
          path: android_app/buildozer.log
          if-no-files-found: ignore
